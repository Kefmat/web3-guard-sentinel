name: Web3-Guard Sentinel Security Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  security-scan:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Run Build and Security Scan
        run: npm start

      - name: Archive Security Scan Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-compliance-reports
          path: reports/
          retention-days: 7